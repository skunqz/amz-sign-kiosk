<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Kiosk</title>

<style>
/* -------- BASIS -------- */
html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#fff;
  font-family:Arial;
  overflow:hidden;
}

/* -------- STANDBY -------- */
.standby{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.standby img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* -------- LIVE VIEW -------- */
.live{
  display:none;
  height:100%;
  flex-direction:column;
}

/* -------- PDF -------- */
#pageFrame{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  max-width:100%;
  max-height:100%;
}

/* -------- BUTTONS -------- */
.bottom{
  padding:12px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:16px;
  font-size:20px;
  border-radius:14px;
  border:none;
  font-weight:bold;
}

.primary{background:#2563eb;color:#fff;}
.secondary{background:#374151;color:#fff;}
.danger{background:#dc2626;color:#fff;}

/* -------- POPUP -------- */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:.3s;
}

.popup.show{
  opacity:1;
  visibility:visible;
}

.popup-box{
  background:#111827;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

.spinner{
  width:60px;
  height:60px;
  border:6px solid #444;
  border-top-color:#3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

.check{
  display:none;
  font-size:40px;
  color:#22c55e;
}

.popup.success .spinner{display:none;}
.popup.success .check{display:block;}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- STANDBY -->
<div id="standby" class="standby">
  <img src="/logo-portrait.png" />
</div>

<!-- LIVE -->
<div id="live" class="live">
  <div id="pageFrame"></div>

  <div class="bottom">
    <button class="secondary" id="clearBtn">Leeren</button>
    <button class="primary" id="submitBtn">Bestätigen</button>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <div class="spinner"></div>
    <div class="check">✓</div>
    <h2 id="popupTitle">Wird gesendet…</h2>
  </div>
</div>

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

const standby = document.getElementById("standby");
const live = document.getElementById("live");
const frame = document.getElementById("pageFrame");
const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popupTitle");

let pdfDoc = null;
let pageStates = [];
let mode = null;

function showPopup(text){
  popupTitle.textContent=text;
  popup.classList.remove("success");
  popup.classList.add("show");
}

function successPopup(){
  popup.classList.add("success");
}

function hidePopup(){
  popup.classList.remove("show","success");
}

function isSignMode(){
  return mode==="mode1" || mode==="mode3";
}

function createCanvas(w,h){
  const c=document.createElement("canvas");
  c.width=w;
  c.height=h;
  return c;
}

function setupDrawing(canvas, overlay){
  const ctx=canvas.getContext("2d");
  ctx.lineWidth=3;
  ctx.strokeStyle="#000";

  let draw=false;

  function pos(e){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?.[0];
    return {
      x:(t?t.clientX:e.clientX)-r.left,
      y:(t?t.clientY:e.clientY)-r.top
    };
  }

  function start(e){draw=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){if(!draw)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function end(){
    draw=false;
    overlay.getContext("2d").drawImage(canvas,0,0);
  }

  canvas.addEventListener("mousedown",start);
  canvas.addEventListener("mousemove",move);
  window.addEventListener("mouseup",end);

  canvas.addEventListener("touchstart",start);
  canvas.addEventListener("touchmove",move);
  window.addEventListener("touchend",end);

  return {
    clear(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      overlay.getContext("2d").clearRect(0,0,overlay.width,overlay.height);
    }
  };
}

async function renderPage(){
  const page=await pdfDoc.getPage(1);
  const viewport=page.getViewport({scale:1.5});

  const pdfCanvas=createCanvas(viewport.width,viewport.height);
  await page.render({canvasContext:pdfCanvas.getContext("2d"),viewport}).promise;

  const overlay=createCanvas(viewport.width,viewport.height);

  const wrap=document.createElement("div");
  wrap.style.position="relative";

  wrap.appendChild(pdfCanvas);

  let drawCanvas=null;

  if(isSignMode()){
    drawCanvas=createCanvas(viewport.width,viewport.height);
    drawCanvas.style.position="absolute";
    drawCanvas.style.top=0;
    wrap.appendChild(drawCanvas);

    const tools=setupDrawing(drawCanvas,overlay);
    drawCanvas.clearOverlay=tools.clear;
  }

  frame.innerHTML="";
  frame.appendChild(wrap);

  pageStates=[{overlayCanvas:overlay}];
}

function buildOverlaysPayload(){
  const res=[];
  if(!isSignMode()) return res;

  pageStates.forEach((s,i)=>{
    res.push({
      pageIndex:i,
      image:s.overlayCanvas.toDataURL("image/png")
    });
  });

  return res;
}

async function submit(){
  try{
    showPopup("Wird gesendet…");

    const res=await fetch("/api/sign",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        overlays:buildOverlaysPayload()
      })
    });

    const data=await res.json();

    if(!data.success) throw new Error();

    successPopup();

    setTimeout(()=>{
      hidePopup();
      location.reload();
    },1500);

  }catch{
    hidePopup();
    alert("Fehler");
  }
}

document.getElementById("submitBtn").onclick=submit;

async function poll(){
  const res=await fetch("/api/document");
  const data=await res.json();

  if(data.status!=="ok"){
    standby.style.display="flex";
    live.style.display="none";
    return;
  }

  standby.style.display="none";
  live.style.display="flex";

  mode=data.mode;

  if(!pdfDoc){
    pdfDoc=await pdfjsLib.getDocument(data.file).promise;
    renderPage();
  }
}

setInterval(poll,2000);
</script>

</body>
</html>
