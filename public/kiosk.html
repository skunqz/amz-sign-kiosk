<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kiosk</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  text-align:center;
}

iframe {
  width:100%;
  height:90vh;
  border:none;
}

button {
  width:100%;
  height:10vh;
  font-size:20px;
  border:none;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<iframe id="pdf"></iframe>
<button onclick="closePdf()">Schließen</button>

<script>
const params = new URLSearchParams(window.location.search);
const screen = params.get("screen") || "1";

async function load() {
  const res = await fetch(`/api/document?screen=${screen}`);
  const data = await res.json();

  if (data.status === "ok") {
    document.getElementById("pdf").src = data.file;
  }
}

async function closePdf(){
  await fetch(`/api/close?screen=${screen}`, { method:"POST" });
  location.reload();
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
