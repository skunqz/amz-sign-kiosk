<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen auswählen</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#0b0b0b;
      --line:#1f1f1f;
      --text:#ffffff;
      --muted:#b3b3b3;
      --accent:#2563eb;
      --accent2:#1d4ed8;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(700px,100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
      text-align:center;
    }

    h1{
      margin:0 0 10px;
      font-size:34px;
    }

    p{
      margin:0 0 28px;
      color:var(--muted);
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .screen-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:170px;
      border-radius:20px;
      text-decoration:none;
      color:white;
      font-size:28px;
      font-weight:800;
      background:var(--accent);
      border:1px solid var(--accent);
      transition:.15s ease;
    }

    .screen-btn:hover{
      background:var(--accent2);
    }

    @media (max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Screen auswählen</h1>
    <p>Bitte wählen Sie den gewünschten Bildschirm aus.</p>

    <div class="grid">
      <a class="screen-btn" href="/kiosk.html?screen=1">Screen 1</a>
      <a class="screen-btn" href="/kiosk.html?screen=2">Screen 2</a>
    </div>
  </div>
</body>
</html>
