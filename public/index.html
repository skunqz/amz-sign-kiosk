<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen wählen</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

.box {
  text-align:center;
}

button {
  display:block;
  width:200px;
  margin:15px auto;
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h1>Screen auswählen</h1>

  <button onclick="go(1)">Screen 1</button>
  <button onclick="go(2)">Screen 2</button>
</div>

<script>
function go(n){
  window.location.href = "/kiosk.html?screen=" + n;
}
</script>

</body>
</html>
