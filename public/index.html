<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AMZ-Kiosk</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #000000;
      color: #e5e7eb;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .screen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .standby {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #555555;
      z-index: 1;
    }

    .standby img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .active {
      display: grid;
      grid-template-rows: 110px 1fr 110px;
      background: #000000;
      z-index: 2;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px;
      background: rgba(0, 0, 0, 0.92);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand img {
      height: 48px;
      max-width: 180px;
      object-fit: contain;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 28px;
      color: #f9fafb;
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 15px;
      color: #a1a1aa;
    }

    .page-indicator {
      font-size: 18px;
      font-weight: 700;
      color: #e5e7eb;
      background: rgba(255,255,255,0.08);
      padding: 12px 18px;
      border-radius: 999px;
    }

    .pdf-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 96px;
      overflow: hidden;
      background: #000000;
    }

    .page-wrap {
      position: relative;
      display: inline-block;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      background: white;
      max-width: 100%;
      max-height: 100%;
    }

    #pdfCanvas {
      display: block;
      background: white;
    }

    #signatureOverlay {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      background: transparent;
      touch-action: none;
      will-change: transform;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 72px;
      height: 72px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 34px;
      cursor: pointer;
      z-index: 3;
    }

    .nav-arrow:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .nav-left {
      left: 16px;
    }

    .nav-right {
      right: 16px;
    }

    .button-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.96);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .button-bar.single {
      grid-template-columns: 1fr;
    }

    button.action-btn {
      font-size: 24px;
      font-weight: 700;
      border: none;
      border-radius: 18px;
      height: 70px;
      cursor: pointer;
      transition: transform 0.12s ease;
    }

    button.action-btn:hover {
      transform: translateY(-1px);
    }

    #clearBtn {
      background: #1f2937;
      color: #f3f4f6;
    }

    #sendBtn, #closeBtn {
      background: #22c55e;
      color: white;
      box-shadow: 0 12px 30px rgba(34,197,94,0.35);
    }

    .success-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.76);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .success-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .success-card {
      min-width: 420px;
      max-width: 70vw;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 38px 36px;
      text-align: center;
      box-shadow: 0 25px 70px rgba(0,0,0,0.45);
      transform: scale(0.96);
      transition: transform 0.25s ease;
    }

    .success-overlay.visible .success-card {
      transform: scale(1);
    }

    .checkmark-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 18px;
      border-radius: 999px;
      background: rgba(34,197,94,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkmark {
      width: 54px;
      height: 54px;
      stroke: #22c55e;
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
    }

    .success-overlay.visible .checkmark {
      animation: drawCheck 0.45s ease forwards 0.1s;
    }

    .success-title {
      margin: 0;
      font-size: 34px;
      color: #f8fafc;
    }

    .success-text {
      margin: 10px 0 0;
      font-size: 18px;
      color: #cbd5e1;
    }

    @keyframes drawCheck {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="standby" class="screen standby visible">
      <img src="/logo-portrait.png" alt="Logo">
    </div>

    <div id="active" class="screen active">
      <div class="topbar">
        <div class="brand">
          <img src="/logo.png" alt="Logo">
          <div class="brand-text">
            <h1 id="headline">Bitte unterschreiben Sie das Dokument</h1>
            <p id="subline">Nutzen Sie die Pfeile, um zwischen den Seiten zu wechseln</p>
          </div>
        </div>
        <div class="page-indicator" id="pageIndicator">Seite 1 / 1</div>
      </div>

      <div class="pdf-stage" id="pdfStage">
        <button id="prevPageBtn" class="nav-arrow nav-left">‹</button>

        <div class="page-wrap" id="pageWrap">
          <canvas id="pdfCanvas"></canvas>
          <canvas id="signatureOverlay"></canvas>
        </div>

        <button id="nextPageBtn" class="nav-arrow nav-right">›</button>
      </div>

      <div id="buttonBar" class="button-bar">
        <button id="clearBtn" class="action-btn">Zurücksetzen</button>
        <button id="sendBtn" class="action-btn">Bestätigen</button>
        <button id="closeBtn" class="action-btn" style="display:none;">Schließen</button>
      </div>
    </div>

    <div id="successOverlay" class="success-overlay">
      <div class="success-card">
        <div class="checkmark-wrap">
          <svg class="checkmark" viewBox="0 0 52 52">
            <path d="M14 27 L22 35 L38 18"></path>
          </svg>
        </div>
        <h2 class="success-title">Erfolgreich gesendet</h2>
        <p class="success-text">Vielen Dank</p>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

    const standby = document.getElementById("standby");
    const active = document.getElementById("active");
    const successOverlay = document.getElementById("successOverlay");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const overlayCanvas = document.getElementById("signatureOverlay");
    const pageIndicator = document.getElementById("pageIndicator");
    const clearBtn = document.getElementById("clearBtn");
    const sendBtn = document.getElementById("sendBtn");
    const closeBtn = document.getElementById("closeBtn");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const pdfStage = document.getElementById("pdfStage");

    let currentVersion = null;
    let isSending = false;
    let currentMode = null;

    let pdfDocRef = null;
    let currentPageIndex = 0;
    let overlaysByPage = [];
    let isDrawing = false;
    let activePointerId = null;

    const pdfCtx = pdfCanvas.getContext("2d", { alpha: false, desynchronized: true });
    const overlayCtx = overlayCanvas.getContext("2d", { alpha: true, desynchronized: true });

    function showStandby() {
      standby.classList.add("visible");
      active.classList.remove("visible");
      successOverlay.classList.remove("visible");
      currentVersion = null;
      currentMode = null;
      pdfDocRef = null;
      overlaysByPage = [];
      currentPageIndex = 0;
      isDrawing = false;
      activePointerId = null;
    }

    function showActive() {
      standby.classList.remove("visible");
      active.classList.add("visible");
    }

    function showSuccess() {
      successOverlay.classList.add("visible");
    }

    function hideSuccess() {
      successOverlay.classList.remove("visible");
    }

    function getOverlayItem(pageIndex) {
      if (!overlaysByPage[pageIndex]) {
        overlaysByPage[pageIndex] = {
          image: null,
          hasSignature: false
        };
      }
      return overlaysByPage[pageIndex];
    }

    function hasAnySignature() {
      return overlaysByPage.some(item => item && item.hasSignature);
    }

    function updateModeUi() {
      if (currentMode === "mode2") {
        clearBtn.style.display = "none";
        sendBtn.style.display = "none";
        closeBtn.style.display = "block";
        document.getElementById("buttonBar").classList.add("single");
        overlayCanvas.style.pointerEvents = "none";
      } else {
        clearBtn.style.display = "block";
        sendBtn.style.display = "block";
        closeBtn.style.display = "none";
        document.getElementById("buttonBar").classList.remove("single");
        overlayCanvas.style.pointerEvents = "auto";
      }
    }

    function updatePageIndicator() {
      const total = pdfDocRef ? pdfDocRef.numPages : 1;
      pageIndicator.textContent = `Seite ${currentPageIndex + 1} / ${total}`;
      prevPageBtn.disabled = currentPageIndex <= 0;
      nextPageBtn.disabled = !pdfDocRef || currentPageIndex >= total - 1;
    }

    function getPos(e) {
      const rect = overlayCanvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function setupOverlayCanvas(width, height) {
      overlayCanvas.width = width;
      overlayCanvas.height = height;
      overlayCanvas.style.width = width + "px";
      overlayCanvas.style.height = height + "px";

      overlayCtx.clearRect(0, 0, width, height);
      overlayCtx.lineWidth = 2.4;
      overlayCtx.lineCap = "round";
      overlayCtx.lineJoin = "round";
      overlayCtx.strokeStyle = "#111111";

      const item = getOverlayItem(currentPageIndex);
      if (item.image) {
        const img = new Image();
        img.onload = () => {
          overlayCtx.drawImage(img, 0, 0, width, height);
        };
        img.src = item.image;
      }
    }

    function saveCurrentOverlay() {
      if (!pdfDocRef || currentMode === "mode2") return;

      const item = getOverlayItem(currentPageIndex);
      item.image = overlayCanvas.toDataURL("image/png");

      const blank = document.createElement("canvas");
      blank.width = overlayCanvas.width;
      blank.height = overlayCanvas.height;
      item.hasSignature = item.image !== blank.toDataURL("image/png");
    }

    function clearCurrentPageSignature() {
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      const item = getOverlayItem(currentPageIndex);
      item.image = null;
      item.hasSignature = false;
    }

    async function renderCurrentPage() {
      if (!pdfDocRef) return;

      const page = await pdfDocRef.getPage(currentPageIndex + 1);
      const viewport = page.getViewport({ scale: 1 });

      const availableWidth = Math.max(300, pdfStage.clientWidth - 220);
      const availableHeight = Math.max(300, pdfStage.clientHeight - 40);

      const scale = Math.min(
        availableWidth / viewport.width,
        availableHeight / viewport.height
      );

      const vp = page.getViewport({ scale });

      pdfCanvas.width = vp.width;
      pdfCanvas.height = vp.height;
      pdfCanvas.style.width = vp.width + "px";
      pdfCanvas.style.height = vp.height + "px";

      await page.render({
        canvasContext: pdfCtx,
        viewport: vp
      }).promise;

      setupOverlayCanvas(vp.width, vp.height);
      updatePageIndicator();
    }

    async function loadPdfDocument(url) {
      pdfDocRef = await pdfjsLib.getDocument(url).promise;
      overlaysByPage = Array.from({ length: pdfDocRef.numPages }, () => ({
        image: null,
        hasSignature: false
      }));
      currentPageIndex = 0;
      await renderCurrentPage();
    }

    async function loadPdf(force = false) {
      try {
        const res = await fetch(`/api/document?_=${Date.now()}`, { cache: "no-store" });
        const data = await res.json();

        if (!force && currentVersion === data.version) return;

        if (data.status === "empty") {
          showStandby();
          return;
        }

        currentVersion = data.version;
        currentMode = data.mode;
        updateModeUi();
        showActive();
        await loadPdfDocument(data.file + "?v=" + data.version);
      } catch (err) {
        console.error("Fehler beim Laden der PDF:", err);
        showStandby();
      }
    }

    function pointerDown(e) {
      if (isSending || currentMode === "mode2") return;
      if (activePointerId !== null) return;

      activePointerId = e.pointerId;
      isDrawing = true;

      overlayCanvas.setPointerCapture(e.pointerId);

      const pos = getPos(e);
      overlayCtx.beginPath();
      overlayCtx.moveTo(pos.x, pos.y);
      e.preventDefault();
    }

    function pointerMove(e) {
      if (!isDrawing || currentMode === "mode2") return;
      if (e.pointerId !== activePointerId) return;

      const pos = getPos(e);
      overlayCtx.lineTo(pos.x, pos.y);
      overlayCtx.stroke();

      const item = getOverlayItem(currentPageIndex);
      item.hasSignature = true;

      e.preventDefault();
    }

    function pointerUp(e) {
      if (e.pointerId !== activePointerId) return;

      isDrawing = false;
      activePointerId = null;
      saveCurrentOverlay();

      try {
        overlayCanvas.releasePointerCapture(e.pointerId);
      } catch (_) {}

      e.preventDefault();
    }

    overlayCanvas.addEventListener("pointerdown", pointerDown, { passive: false });
    overlayCanvas.addEventListener("pointermove", pointerMove, { passive: false });
    overlayCanvas.addEventListener("pointerup", pointerUp, { passive: false });
    overlayCanvas.addEventListener("pointercancel", pointerUp, { passive: false });

    prevPageBtn.addEventListener("click", async () => {
      if (!pdfDocRef || currentPageIndex <= 0) return;
      saveCurrentOverlay();
      currentPageIndex -= 1;
      await renderCurrentPage();
    });

    nextPageBtn.addEventListener("click", async () => {
      if (!pdfDocRef || currentPageIndex >= pdfDocRef.numPages - 1) return;
      saveCurrentOverlay();
      currentPageIndex += 1;
      await renderCurrentPage();
    });

    clearBtn.addEventListener("click", () => {
      if (isSending) return;
      clearCurrentPageSignature();
    });

    sendBtn.addEventListener("click", async () => {
      if (isSending || currentMode === "mode2") return;

      saveCurrentOverlay();

      if (!hasAnySignature()) {
        alert("Bitte unterschreiben");
        return;
      }

      isSending = true;

      try {
        const overlays = overlaysByPage
          .map((item, pageIndex) => ({ ...item, pageIndex }))
          .filter(item => item.hasSignature && item.image);

        const res = await fetch(`/api/sign`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ overlays })
        });

        const data = await res.json();

        if (data.success) {
          showSuccess();

          setTimeout(() => {
            hideSuccess();
            showStandby();
          }, 1600);

          setTimeout(() => {
            loadPdf(true);
            isSending = false;
          }, 2100);
        } else {
          isSending = false;
          alert(data.error || "Fehler");
        }
      } catch (err) {
        isSending = false;
        alert("Fehler: " + err.message);
      }
    });

    closeBtn.addEventListener("click", async () => {
      if (isSending) return;
      isSending = true;

      try {
        const res = await fetch(`/api/close`, {
          method: "POST"
        });

        const data = await res.json();

        if (data.success) {
          showSuccess();

          setTimeout(() => {
            hideSuccess();
            showStandby();
          }, 1200);

          setTimeout(() => {
            loadPdf(true);
            isSending = false;
          }, 1700);
        } else {
          isSending = false;
          alert(data.error || "Fehler");
        }
      } catch (err) {
        isSending = false;
        alert("Fehler: " + err.message);
      }
    });

    loadPdf(true);

    setInterval(() => {
      if (!isSending) {
        loadPdf(false);
      }
    }, 3000);
  </script>
</body>
</html>
