<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
}

select, button, input {
  margin:10px 0;
  padding:10px;
  width:100%;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<select id="screen">
  <option value="1">Screen 1</option>
  <option value="2">Screen 2</option>
</select>

<input type="file" id="file">

<button onclick="upload()">PDF hochladen</button>
<button onclick="closePdf()">PDF schließen</button>

<iframe id="preview" style="width:100%; height:500px;"></iframe>

<script>
const screenSelect = document.getElementById("screen");

function currentScreen(){
  return screenSelect.value;
}

async function upload(){
  const file = document.getElementById("file").files[0];
  const fd = new FormData();
  fd.append("pdf", file);

  await fetch(`/api/upload?screen=${currentScreen()}`, {
    method:"POST",
    body: fd
  });

  load();
}

async function closePdf(){
  await fetch(`/api/close?screen=${currentScreen()}`, { method:"POST" });
  load();
}

async function load(){
  const res = await fetch(`/api/document?screen=${currentScreen()}`);
  const data = await res.json();

  if(data.status==="ok"){
    document.getElementById("preview").src = data.file;
  } else {
    document.getElementById("preview").src = "";
  }
}

screenSelect.addEventListener("change", load);

load();
</script>

</body>
</html>
