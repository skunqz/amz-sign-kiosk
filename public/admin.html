<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary {
      background: #374151;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }

    #status {
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1>Admin Panel</h1>
      <button onclick="logout()" class="secondary">Logout</button>
    </div>

    <div class="card">
      <h3>Modus auswählen</h3>

      <select id="mode">
        <option value="mode1">Mit Kundendaten + Unterschrift</option>
        <option value="mode2">Nur anzeigen (keine Unterschrift)</option>
        <option value="mode3">Name + Grund + Unterschrift</option>
      </select>
    </div>

    <div class="card" id="formCard">
      <h3>Kundendaten</h3>

      <input id="name" placeholder="Name">
      <input id="email" placeholder="E-Mail">
      <input id="phone" placeholder="Telefon">
      <input id="reason" placeholder="Grund">

      <button onclick="saveSession()">Speichern</button>
    </div>

    <div class="card">
      <h3>PDF hochladen</h3>

      <input type="file" id="pdfFile">

      <button onclick="upload()">Upload</button>

      <div id="status"></div>
    </div>
  </div>

  <script>
    const modeSelect = document.getElementById("mode");
    const formCard = document.getElementById("formCard");

    modeSelect.addEventListener("change", updateForm);

    function updateForm() {
      const mode = modeSelect.value;

      document.getElementById("email").style.display = "block";
      document.getElementById("phone").style.display = "block";
      document.getElementById("reason").style.display = "block";

      if (mode === "mode2") {
        formCard.style.display = "none";
      } else {
        formCard.style.display = "block";

        if (mode === "mode1") {
          document.getElementById("reason").style.display = "none";
        }

        if (mode === "mode3") {
          document.getElementById("email").style.display = "none";
          document.getElementById("phone").style.display = "none";
        }
      }
    }

    updateForm();

    async function saveSession() {
      const data = {
        mode: modeSelect.value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        reason: document.getElementById("reason").value
      };

      const res = await fetch("/api/session", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (result.success) {
        alert("Gespeichert");
      } else {
        alert(result.error);
      }
    }

    async function upload() {
      const file = document.getElementById("pdfFile").files[0];
      if (!file) return alert("Keine Datei");

      const formData = new FormData();
      formData.append("pdf", file);

      const res = await fetch("/api/upload", {
        method: "POST",
        body: formData
      });

      const result = await res.json();

      if (result.success) {
        document.getElementById("status").innerText = "Upload erfolgreich";
      } else {
        document.getElementById("status").innerText = result.error;
      }
    }

    async function logout() {
      await fetch("/logout", { method: "POST" });
      location.href = "/admin";
    }
  </script>
</body>
</html>
