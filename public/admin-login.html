<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: Arial;
      color: white;
    }

    .box {
      background: #1f1f1f;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Admin Login</h2>

    <input id="user" placeholder="Benutzername">
    <input id="pass" type="password" placeholder="Passwort">

    <button onclick="login()">Login</button>

    <div id="msg"></div>
  </div>

  <script>
    async function login() {
      const res = await fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: document.getElementById("user").value,
          password: document.getElementById("pass").value
        })
      });

      if (res.ok) {
        location.href = "/admin";
      } else {
        document.getElementById("msg").innerText = "Falsche Daten";
      }
    }
  </script>
</body>
</html>
