<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #111827 50%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #e5e7eb;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      box-shadow: 0 28px 70px rgba(0,0,0,0.45);
      padding: 34px;
      backdrop-filter: blur(12px);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .logo-wrap img {
      max-width: 200px;
      max-height: 84px;
      object-fit: contain;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      text-align: center;
      color: #f8fafc;
    }

    p {
      margin: 0 0 26px;
      text-align: center;
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #f8fafc;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus {
      border-color: rgba(255,255,255,0.28);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      margin-top: 8px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      background: #22c55e;
      color: white;
      box-shadow: 0 14px 30px rgba(34,197,94,0.28);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    #msg {
      min-height: 24px;
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
    }

    .error {
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/logo.png" alt="Logo" />
    </div>

    <h1>Admin Login</h1>
    <p>Bitte melden Sie sich an, um Dokumente hochzuladen und den Kiosk zu verwalten.</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Benutzername</label>
        <input id="username" name="username" type="text" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button type="submit" id="loginBtn">Einloggen</button>
      <div id="msg"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      msg.textContent = "";
      msg.className = "";
      btn.disabled = true;
      btn.textContent = "Einloggen...";

      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value.trim()
      };

      try {
        const res = await fetch("/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = "/admin";
        } else {
          msg.textContent = data.error || "Login fehlgeschlagen.";
          msg.className = "error";
        }
      } catch (err) {
        msg.textContent = "Fehler: " + err.message;
        msg.className = "error";
      } finally {
        btn.disabled = false;
        btn.textContent = "Einloggen";
      }
    });
  </script>
</body>
</html>
