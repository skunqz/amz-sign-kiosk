name: Deploy kiosk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on server
        run: |
          cd /opt/kiosk-app
          git fetch origin
          git reset --hard origin/main
          npm install
          pm2 restart kiosk || pm2 start server/app.js --name kiosk
          pm2 save